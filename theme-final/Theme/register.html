<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — Östral Play</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="Assets/CSS/main.css">
</head>
<body>

<div class="op-auth-page">
  <div class="op-auth-bg"></div>
  <div class="op-auth-card" style="max-width:480px">
    <div class="op-auth-logo">
      <img src="Assets/Medias/Logos/logo-complet.png" alt="Östral Play">
    </div>
    <h1 class="op-auth-title">Créer un compte</h1>
    <p class="op-auth-sub">Rejoignez Östral Play — 14 jours gratuits</p>

    <form action="index.html">
      <div class="row g-3 mb-0">
        <div class="col-6">
          <div class="op-form-group">
            <label class="op-form-label">Prénom</label>
            <input type="text" class="op-form-control" placeholder="Jean" required>
          </div>
        </div>
        <div class="col-6">
          <div class="op-form-group">
            <label class="op-form-label">Nom</label>
            <input type="text" class="op-form-control" placeholder="Dupont" required>
          </div>
        </div>
      </div>
      <div class="op-form-group">
        <label class="op-form-label">Adresse e-mail</label>
        <input type="email" class="op-form-control" placeholder="vous@exemple.com" required>
      </div>
      <div class="op-form-group">
        <label class="op-form-label">Mot de passe</label>
        <input type="password" class="op-form-control" placeholder="8 caractères minimum" required>
        <p class="op-form-helper">Utilisez lettres, chiffres et symboles pour plus de sécurité.</p>
      </div>
      <div class="op-form-group">
        <label class="op-form-label">Confirmer le mot de passe</label>
        <input type="password" class="op-form-control" placeholder="Répétez votre mot de passe" required>
      </div>

      <!-- Plan selection -->
      <div class="op-form-group">
        <label class="op-form-label">Choisissez votre offre</label>
        <div class="d-flex gap-2">
          <div class="flex-fill p-3 rounded-3 text-center" style="border:1.5px solid var(--op-border-light); cursor:pointer; transition:border-color .2s" onclick="this.parentNode.querySelectorAll('div').forEach(e=>e.style.borderColor='rgba(255,255,255,0.12)'); this.style.borderColor='#F7941D'">
            <div style="font-size:13px; font-weight:700; color:#fff">Essentiel</div>
            <div style="font-size:12px; color:var(--op-text-muted)">7,99 €/mois</div>
          </div>
          <div class="flex-fill p-3 rounded-3 text-center" style="border:1.5px solid #F7941D; cursor:pointer; transition:border-color .2s; background:rgba(247,148,29,.07)">
            <div style="font-size:13px; font-weight:700; color:#F7941D">Premium</div>
            <div style="font-size:12px; color:var(--op-text-muted)">12,99 €/mois</div>
          </div>
          <div class="flex-fill p-3 rounded-3 text-center" style="border:1.5px solid var(--op-border-light); cursor:pointer; transition:border-color .2s" onclick="this.parentNode.querySelectorAll('div').forEach(e=>e.style.borderColor='rgba(255,255,255,0.12)'); this.style.borderColor='#F7941D'">
            <div style="font-size:13px; font-weight:700; color:#fff">Famille</div>
            <div style="font-size:12px; color:var(--op-text-muted)">18,99 €/mois</div>
          </div>
        </div>
      </div>

      <div class="op-form-group">
        <label style="display:flex; gap:10px; align-items:flex-start; cursor:pointer">
          <input type="checkbox" style="margin-top:3px; accent-color:#F7941D" required>
          <span style="font-size:13px; color:var(--op-text-muted)">J'accepte les <a href="terms.html" style="color:var(--op-accent)">Conditions d'utilisation</a> et la <a href="privacy.html" style="color:var(--op-accent)">Politique de confidentialité</a></span>
        </label>
      </div>

      <button type="submit" class="op-btn op-btn-primary op-btn-full">
        <i class="bi bi-person-plus-fill"></i> Créer mon compte
      </button>
    </form>

    <p class="op-auth-link">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="Assets/JS/main.js"></script>
</body>
</html>
