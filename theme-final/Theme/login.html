<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Östral Play</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="Assets/CSS/main.css">
</head>
<body>

<div class="op-auth-page">
  <div class="op-auth-bg"></div>
  <div class="op-auth-card">
    <div class="op-auth-logo">
      <img src="Assets/Medias/Logos/logo-complet.png" alt="Östral Play">
    </div>
    <h1 class="op-auth-title">Bienvenue</h1>
    <p class="op-auth-sub">Connectez-vous à votre compte Östral Play</p>

    <form action="index.html">
      <div class="op-form-group">
        <label class="op-form-label">Adresse e-mail</label>
        <input type="email" class="op-form-control" placeholder="vous@exemple.com" required>
      </div>
      <div class="op-form-group">
        <label class="op-form-label">
          Mot de passe
          <a href="#" style="float:right; color:var(--op-accent); font-weight:600; font-size:12px;">Oublié ?</a>
        </label>
        <input type="password" class="op-form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="op-btn op-btn-primary op-btn-full">
        <i class="bi bi-box-arrow-in-right"></i> Se connecter
      </button>
    </form>

    <div class="op-divider">ou continuer avec</div>

    <div class="d-flex gap-3">
      <button class="op-btn op-btn-secondary op-btn-full" style="flex:1">
        <i class="bi bi-google"></i> Google
      </button>
      <button class="op-btn op-btn-secondary op-btn-full" style="flex:1">
        <i class="bi bi-apple"></i> Apple
      </button>
    </div>

    <p class="op-auth-link">
      Pas encore de compte ? <a href="register.html">S'inscrire gratuitement</a>
    </p>
    <p class="op-auth-link" style="margin-top:12px">
      <a href="index.html" style="color:var(--op-text-dim); font-size:13px;">
        <i class="bi bi-arrow-left"></i> Retour à l'accueil
      </a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="Assets/JS/main.js"></script>
</body>
</html>
