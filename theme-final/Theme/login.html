<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Östral Play</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="Assets/CSS/main.css">
  <style>
    .op-auth-page-fixed {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #0A0A0A;
    }
    /* Mosaïque de fond : les 3 slides en arriere-plan */
    .op-auth-backdrop {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 50%);
      gap: 3px;
      overflow: hidden;
    }
    .op-auth-backdrop img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Overlay sombre pour que le formulaire ressorte */
    .op-auth-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(10,10,10,0.7) 0%, rgba(10,10,10,0.92) 100%),
        linear-gradient(to bottom, rgba(10,10,10,0.5) 0%, rgba(10,10,10,0.85) 100%);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .op-auth-card-fixed {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      background: rgba(16,16,16,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.75);
      margin: 24px;
    }
    @media (max-width: 575px) {
      .op-auth-card-fixed { padding: 36px 22px; margin: 16px; }
    }
  </style>
</head>
<body>

<div class="op-auth-page-fixed">

  <!-- Fond mosaïque de posters -->
  <div class="op-auth-backdrop">
    <img src="Assets/Medias/Img/slide-1.jpg" alt="">
    <img src="Assets/Medias/Img/poster-1.jpg" alt="">
    <img src="Assets/Medias/Img/slide-2.jpg" alt="">
    <img src="Assets/Medias/Img/poster-4.jpg" alt="">
    <img src="Assets/Medias/Img/slide-3.jpg" alt="">
    <img src="Assets/Medias/Img/poster-7.jpg" alt="">
  </div>
  <div class="op-auth-overlay"></div>

  <!-- Formulaire -->
  <div class="op-auth-card-fixed">
    <div class="op-auth-logo">
      <img src="Assets/Medias/Logos/logo-complet.png" alt="Östral Play" style="height:40px;margin:0 auto">
    </div>
    <h1 class="op-auth-title">Bienvenue</h1>
    <p class="op-auth-sub">Connectez-vous à votre compte</p>

    <form action="index.html">
      <div class="op-form-group">
        <label class="op-form-label">Adresse e-mail</label>
        <input type="email" class="op-form-control" placeholder="vous@exemple.com" required>
      </div>
      <div class="op-form-group">
        <label class="op-form-label" style="display:flex;justify-content:space-between;align-items:center">
          Mot de passe
          <a href="#" style="color:var(--op-accent);font-weight:600;font-size:12px">Oublié ?</a>
        </label>
        <input type="password" class="op-form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="op-btn op-btn-primary op-btn-full">
        <i class="bi bi-box-arrow-in-right"></i> Se connecter
      </button>
    </form>

    <div class="op-divider">ou continuer avec</div>

    <div class="d-flex gap-3">
      <button class="op-btn op-btn-secondary op-btn-full" style="flex:1">
        <i class="bi bi-google"></i> Google
      </button>
      <button class="op-btn op-btn-secondary op-btn-full" style="flex:1">
        <i class="bi bi-apple"></i> Apple
      </button>
    </div>

    <p class="op-auth-link">
      Pas encore de compte ? <a href="register.html">S'inscrire gratuitement</a>
    </p>
    <p class="op-auth-link" style="margin-top:10px">
      <a href="welcome.html" style="color:var(--op-text-dim);font-size:13px">
        <i class="bi bi-arrow-left"></i> Retour à l’accueil
      </a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="Assets/JS/main.js"></script>
</body>
</html>
