<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecture — Östral Play</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="Assets/CSS/main.css">
</head>
<body style="background:#000">

<div class="op-player-page">

  <!-- Player Header -->
  <div class="op-player-header">
    <a href="movie-detail.html" class="op-btn op-btn-ghost op-btn-sm" style="color:#fff">
      <i class="bi bi-arrow-left"></i> Retour
    </a>
    <img src="Assets/Medias/Logos/logo.png" alt="Östral Play" style="height:28px;">
    <div class="op-player-info">
      <p class="op-player-title">Nuits Polaires</p>
      <p class="op-player-subtitle">2026 &bull; 2h 14min &bull; 4K</p>
    </div>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <button class="op-player-btn" title="Sous-titres"><i class="bi bi-badge-cc"></i></button>
      <button class="op-player-btn" title="Qualité"><i class="bi bi-hd"></i></button>
      <button class="op-player-btn" title="Plein écran"><i class="bi bi-fullscreen"></i></button>
    </div>
  </div>

  <!-- Player -->
  <div class="op-player-wrapper">
    <img src="Assets/Medias/Img/player-1.jpg" alt="Nuits Polaires" class="op-player-thumb">

    <!-- Center Play Button -->
    <div class="op-player-center-play">
      <button class="op-player-big-btn" data-playing="false">
        <i class="bi bi-play-fill"></i>
      </button>
    </div>

    <!-- Controls -->
    <div class="op-player-controls">
      <div class="op-player-progress">
        <div class="op-player-progress-fill"></div>
      </div>
      <div class="op-player-btns">
        <button class="op-player-btn"><i class="bi bi-skip-backward-fill"></i></button>
        <button class="op-player-btn"><i class="bi bi-skip-forward-fill"></i></button>
        <button class="op-player-btn"><i class="bi bi-volume-up-fill"></i></button>
        <span class="op-player-time">42:17 / 2:14:05</span>
        <div class="op-player-right">
          <button class="op-player-btn" title="Sous-titres"><i class="bi bi-badge-cc"></i></button>
          <button class="op-player-btn" title="Vitesse"><i class="bi bi-speedometer"></i></button>
          <button class="op-player-btn" title="Plein écran"><i class="bi bi-fullscreen"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Below player -->
  <div style="padding:24px 32px;">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h2 style="font-size:20px;font-weight:800;color:#fff;margin-bottom:4px">Nuits Polaires</h2>
        <p style="font-size:14px;color:rgba(255,255,255,0.5);margin:0">Thriller &bull; 2026 &bull; 4K Dolby Vision</p>
      </div>
      <div class="d-flex gap-2">
        <button class="op-btn op-btn-secondary op-btn-sm"><i class="bi bi-bookmark-plus"></i> Ma Liste</button>
        <button class="op-btn op-btn-secondary op-btn-sm"><i class="bi bi-share"></i> Partager</button>
        <a href="movie-detail.html" class="op-btn op-btn-outline op-btn-sm"><i class="bi bi-info-circle"></i> Détails</a>
      </div>
    </div>

    <!-- Next up -->
    <div class="mt-5">
      <h3 style="font-size:16px;font-weight:700;color:#fff;margin-bottom:16px">Regarder ensuite</h3>
      <div class="d-flex gap-3 overflow-x-auto" style="scrollbar-width:none;padding-bottom:8px">
        <a href="movie-player.html" class="op-card op-card--landscape" style="flex-shrink:0">
          <img src="Assets/Medias/Img/player-2.jpg" alt="" class="op-card-img">
          <div class="op-card-overlay"></div>
          <span class="op-card-badge op-badge-hd">HD</span>
          <div class="op-card-play"><div class="op-card-play-btn"><i class="bi bi-play-fill"></i></div></div>
          <div class="op-card-info"><p class="op-card-title">La Forteresse</p><div class="op-card-meta"><i class="bi bi-star-fill star"></i><span>8.7</span></div></div>
        </a>
        <a href="movie-player.html" class="op-card op-card--landscape" style="flex-shrink:0">
          <img src="Assets/Medias/Img/player-3.jpg" alt="" class="op-card-img">
          <div class="op-card-overlay"></div>
          <span class="op-card-badge op-badge-new">NEW</span>
          <div class="op-card-play"><div class="op-card-play-btn"><i class="bi bi-play-fill"></i></div></div>
          <div class="op-card-info"><p class="op-card-title">Le Prix du Sang</p><div class="op-card-meta"><i class="bi bi-star-fill star"></i><span>8.2</span></div></div>
        </a>
        <a href="movie-player.html" class="op-card op-card--landscape" style="flex-shrink:0">
          <img src="Assets/Medias/Img/poster-7.jpg" alt="" class="op-card-img">
          <div class="op-card-overlay"></div>
          <span class="op-card-badge op-badge-4k">4K</span>
          <div class="op-card-play"><div class="op-card-play-btn"><i class="bi bi-play-fill"></i></div></div>
          <div class="op-card-info"><p class="op-card-title">Au-delà du Temps</p><div class="op-card-meta"><i class="bi bi-star-fill star"></i><span>8.9</span></div></div>
        </a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="Assets/JS/main.js"></script>
</body>
</html>
