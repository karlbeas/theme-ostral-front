<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Östral Play</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="Assets/CSS/main.css">
</head>
<body>
<div class="op-legal-page">
  <header class="op-legal-header">
    <a href="index.html" class="op-legal-logo"><img src="Assets/Medias/Logos/logo.png" alt="Östral Play"></a>
    <a href="index.html" class="op-legal-back"><i class="bi bi-arrow-left"></i> Retour</a>
  </header>
  <main class="op-legal-main">
    <h1 class="op-legal-title">Nous contacter</h1>
    <p class="op-legal-date">Disponible 7j/7 de 8h00 à 22h00</p>

    <div class="op-contact-grid">
      <!-- Sidebar -->
      <div class="op-contact-sidebar">
        <div class="op-contact-info-item">
          <i class="bi bi-envelope-fill op-contact-info-icon"></i>
          <div>
            <p class="op-contact-info-label">E-mail</p>
            <p class="op-contact-info-value">support@ostral-play.com</p>
          </div>
        </div>
        <div class="op-contact-info-item">
          <i class="bi bi-chat-fill op-contact-info-icon"></i>
          <div>
            <p class="op-contact-info-label">Chat en ligne</p>
            <p class="op-contact-info-value">Réponse en moins de 2 min</p>
          </div>
        </div>
        <div class="op-contact-info-item">
          <i class="bi bi-clock-fill op-contact-info-icon"></i>
          <div>
            <p class="op-contact-info-label">Horaires</p>
            <p class="op-contact-info-value">Lun–Dim 8h–22h (CET)</p>
          </div>
        </div>
        <div class="op-contact-info-item">
          <i class="bi bi-geo-alt-fill op-contact-info-icon"></i>
          <div>
            <p class="op-contact-info-label">Adresse</p>
            <p class="op-contact-info-value">Östral Play SAS<br>42 Rue de la Paix<br>75001 Paris, France</p>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div>
        <form>
          <div class="row g-3">
            <div class="col-12 col-sm-6">
              <div class="op-form-group" style="margin-bottom:0">
                <label class="op-form-label" style="color:#666">Prénom</label>
                <input type="text" class="op-form-control" style="background:#F5F5F5;border-color:#E0E0E0;color:#1a1a1a" placeholder="Jean">
              </div>
            </div>
            <div class="col-12 col-sm-6">
              <div class="op-form-group" style="margin-bottom:0">
                <label class="op-form-label" style="color:#666">Nom</label>
                <input type="text" class="op-form-control" style="background:#F5F5F5;border-color:#E0E0E0;color:#1a1a1a" placeholder="Dupont">
              </div>
            </div>
            <div class="col-12">
              <div class="op-form-group" style="margin-bottom:0">
                <label class="op-form-label" style="color:#666">E-mail</label>
                <input type="email" class="op-form-control" style="background:#F5F5F5;border-color:#E0E0E0;color:#1a1a1a" placeholder="vous@exemple.com">
              </div>
            </div>
            <div class="col-12">
              <div class="op-form-group" style="margin-bottom:0">
                <label class="op-form-label" style="color:#666">Sujet</label>
                <select class="op-form-control op-filter-select" style="background:#F5F5F5;border-color:#E0E0E0;color:#1a1a1a;padding-right:36px;width:100%">
                  <option>Abonnement et paiement</option>
                  <option>Problème technique</option>
                  <option>Contenu manquant</option>
                  <option>Question générale</option>
                  <option>Autre</option>
                </select>
              </div>
            </div>
            <div class="col-12">
              <div class="op-form-group" style="margin-bottom:0">
                <label class="op-form-label" style="color:#666">Message</label>
                <textarea class="op-form-control" style="background:#F5F5F5;border-color:#E0E0E0;color:#1a1a1a;min-height:140px" placeholder="Décrivez votre demande..." maxlength="1000"></textarea>
                <p class="op-form-helper">0 / 1000 caractères</p>
              </div>
            </div>
            <div class="col-12">
              <button type="submit" class="op-btn op-btn-primary"><i class="bi bi-send-fill"></i> Envoyer le message</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>
  <footer class="op-legal-footer">© 2026 Östral Play. Tous droits réservés.</footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="Assets/JS/main.js"></script>
</body></html>
