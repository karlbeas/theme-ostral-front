<!DOCTYPE html>
<html lang="fr">
<head>

<body style="background:#000">
<div class="op-player-page">
  <div class="op-player-header">

    <img src="Assets/Medias/Logos/logo.png" alt="Östral Play" style="height:28px;">
    <div class="op-player-info">

      <button class="op-player-btn" title="Plein écran"><i class="bi bi-fullscreen"></i></button>
    </div>
  </div>
  <div class="op-player-wrapper">
    <img src="Assets/Medias/Img/player-2.jpg" alt="Dark Protocol" class="op-player-thumb">

        <div class="op-player-right">
          <button class="op-player-btn"><i class="bi bi-badge-cc"></i></button>
          <button class="op-player-btn"><i class="bi bi-speedometer"></i></button>
          <button class="op-player-btn"><i class="bi bi-fullscreen"></i></button>
        </div>
      </div>
    </div>
  </div>
  <div style="padding:24px 32px;">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h2 style="font-size:18px;font-weight:800;color:#fff;margin-bottom:4px">Dark Protocol — S2 · E5 « La Cage »</h2>
        <p style="font-size:14px;color:rgba(255,255,255,.5);margin:0">Thriller &bull; 2025 &bull; 4K &bull; 62 min</p>

      </div>
    </div>
    <div class="mt-5">
      <h3 style="font-size:16px;font-weight:700;color:#fff;margin-bottom:16px">Épisode suivant</h3>
      <div class="d-flex gap-3" style="overflow-x:auto;scrollbar-width:none;padding-bottom:8px">
        <a href="episode-player.html" class="op-card op-card--landscape" style="flex-shrink:0"><img src="Assets/Medias/Img/player-3.jpg" alt="" class="op-card-img"><div class="op-card-overlay"></div><div class="op-card-play"><div class="op-card-play-btn"><i class="bi bi-play-fill"></i></div></div><div class="op-card-info"><p class="op-card-title">S2E6 • Extraction</p><div class="op-card-meta"><i class="bi bi-clock" style="font-size:9px"></i><span>58 min</span></div></div></a>
        <a href="episode-player.html" class="op-card op-card--landscape" style="flex-shrink:0"><img src="Assets/Medias/Img/player-1.jpg" alt="" class="op-card-img"><div class="op-card-overlay"></div><div class="op-card-play"><div class="op-card-play-btn"><i class="bi bi-play-fill"></i></div></div><div class="op-card-info"><p class="op-card-title">S2E7 • Fin du Protocole</p><div class="op-card-meta"><i class="bi bi-clock" style="font-size:9px"></i><span>70 min</span></div></div></a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

<script src="Assets/JS/main.js"></script>
